version: '3.9'

networks:
  aigw_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  n8n_data:

services:

  # ─────────────────────────────────────────
  # NGINX — Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: aigw_nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - public-web
      - client-dashboard
      - admin-dashboard
      - backend
    networks:
      - aigw_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  # POSTGRESQL — Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aigw_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aigw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aigw_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aigw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # REDIS — Cache + Queue
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aigw_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - aigw_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # BACKEND — Node.js + Express API
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aigw_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/aigw
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      N8N_URL: http://n8n:5678
      N8N_WEBHOOK_SECRET: dev-n8n-secret
      AI_WORKERS_URL: http://ai-workers:8000
      AI_WORKERS_SECRET: dev-ai-secret
      PORT: 5000
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aigw_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # PUBLIC WEB — Next.js Marketing Site
  # ─────────────────────────────────────────
  public-web:
    build:
      context: ./apps/public-web
      dockerfile: Dockerfile
    container_name: aigw_public_web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5001
      PORT: 3000
    volumes:
      - ./apps/public-web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - aigw_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────
  # CLIENT DASHBOARD — Next.js SaaS Platform
  # ─────────────────────────────────────────
  client-dashboard:
    build:
      context: ./apps/client-dashboard
      dockerfile: Dockerfile
    container_name: aigw_client_dashboard
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5001
      PORT: 3001
    volumes:
      - ./apps/client-dashboard:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3001:3001"
    networks:
      - aigw_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────
  # ADMIN DASHBOARD — Next.js Internal Office
  # ─────────────────────────────────────────
  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      dockerfile: Dockerfile
    container_name: aigw_admin_dashboard
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5001
      PORT: 3002
    volumes:
      - ./apps/admin-dashboard:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3002:3002"
    networks:
      - aigw_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────
  # N8N — Automation Engine (INTERNAL ONLY)
  # ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: aigw_n8n
    environment:
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678
      N8N_USER_MANAGEMENT_DISABLED: "true"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: aigw
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: password
      DB_POSTGRESDB_SCHEMA: n8n
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    # NO ports exposed — internal only
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aigw_network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # AI WORKERS — Python FastAPI (INTERNAL ONLY)
  # ─────────────────────────────────────────
  ai-workers:
    build:
      context: ./ai-workers
      dockerfile: Dockerfile
    container_name: aigw_ai_workers
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/aigw
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:5000
      AI_WORKERS_SECRET: dev-ai-secret
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./ai-workers:/app
    # NO ports exposed — internal only
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - aigw_network
    restart: unless-stopped
