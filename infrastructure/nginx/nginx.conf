events {
    worker_connections 1024;
}

http {
    upstream public_web {
        server public-web:3000;
    }

    upstream client_dashboard {
        server client-dashboard:3001;
    }

    upstream admin_dashboard {
        server admin-dashboard:3002;
    }

    upstream backend_api {
        server backend:5000;
    }

    upstream n8n_engine {
        server n8n:5678;
    }

    # ─── PUBLIC WEBSITE ───────────────────────
    server {
        listen 80;
        server_name localhost aigw.local;

        location / {
            proxy_pass http://public_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ─── CLIENT DASHBOARD ─────────────────────
    server {
        listen 80;
        server_name app.aigw.local;

        location / {
            proxy_pass http://client_dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ─── ADMIN DASHBOARD ──────────────────────
    server {
        listen 80;
        server_name admin.aigw.local;

        location / {
            proxy_pass http://admin_dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ─── BACKEND API ──────────────────────────
    server {
        listen 80;
        server_name api.aigw.local;

        location / {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ─── N8N ENGINE (INTERNAL AUTOMATION DEVELOPER PORTAL) ─────
    server {
        listen 80;
        server_name n8n.aigw.local;

        location / {
            proxy_pass http://n8n_engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
